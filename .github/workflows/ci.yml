name: CI

on:
  push:
    branches: ['**']
  pull_request:

permissions:
  contents: read

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        # Action épinglée par SHA (supply-chain) : v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.4
          tools: composer:v2

      - name: Install dependencies
        run: composer install

      - name: Lint PHP (module, hors vendor)
        run: |
          find . -name '*.php' -not -path './vendor/*' -print0 | xargs -0 -n1 php -l > /dev/null
          echo "Lint OK"

      - name: Run standalone unit tests (XSD + règles métier EN16931)
        run: php tests/unit-tests.php

      - name: Run PHPUnit tests
        run: php vendor/bin/phpunit

      - name: PHP Compatibility 7.4
        run: php vendor/bin/phpcs -p ./*.php -p ./core -p ./class -p ./admin --standard=vendor/phpcompatibility/php-compatibility/PHPCompatibility/ruleset.xml --runtime-set testVersion 7.4
      - name: PHP Compatibility 8.0
        run: php vendor/bin/phpcs -p ./*.php -p ./core -p ./class -p ./admin --standard=vendor/phpcompatibility/php-compatibility/PHPCompatibility/ruleset.xml --runtime-set testVersion 8.0
      - name: PHP Compatibility 8.2
        run: php vendor/bin/phpcs -p ./*.php -p ./core -p ./class -p ./admin --standard=vendor/phpcompatibility/php-compatibility/PHPCompatibility/ruleset.xml --runtime-set testVersion 8.2
      - name: PHP Compatibility 8.4
        run: php vendor/bin/phpcs -p ./*.php -p ./core -p ./class -p ./admin --standard=vendor/phpcompatibility/php-compatibility/PHPCompatibility/ruleset.xml --runtime-set testVersion 8.4
